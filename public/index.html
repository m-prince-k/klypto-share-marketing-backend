<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Live Option Chain</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for in-browser JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body class="bg-gray-900">
    <div id="root"></div>
    <script>
        async function bootOptionChainUi() {
            try {
                const response = await fetch('./OptionChainUI.jsx?v=20260619-2', { cache: 'no-store' });
                const jsxCode = await response.text();
                const transformed = Babel.transform(jsxCode, {
                    sourceType: 'unambiguous',
                    presets: [
                        ['env', { modules: false }],
                        ['react', { runtime: 'classic' }],
                    ],
                }).code;
                const script = document.createElement('script');
                script.text = transformed;
                document.body.appendChild(script);
            } catch (error) {
                console.error('Error loading the app:', error);
                document.getElementById('root').innerHTML =
                    '<div class="text-white p-5">Failed to load UI. See console.</div>';
            }
        }

        bootOptionChainUi();
    </script>
</body>

</html>
